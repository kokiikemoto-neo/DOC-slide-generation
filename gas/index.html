<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>SlideGen 企業検索</title>
  <style>
    :root { --ink:#1E1D56; --accent:#5B6BF5; --line:#DFDEFD; --bg:#F4F4FE; }
    * { box-sizing: border-box; }
    body { font-family: "Noto Sans JP", system-ui, sans-serif; color: var(--ink); background: var(--bg); margin: 0; padding: 24px; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:16px; }
    label.fld { display:block; font-size:12px; font-weight:bold; margin-bottom:6px; }
    input[type=text], input[type=number] { width:100%; padding:8px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .range { display:flex; align-items:center; gap:8px; }
    .range input { width:100%; }
    .tags { display:flex; flex-wrap:wrap; gap:8px; max-height:120px; overflow:auto; }
    .tag { font-size:13px; border:1px solid var(--line); border-radius:999px; padding:4px 10px; cursor:pointer; user-select:none; background:#fff; }
    .tag.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .actions { margin-top:16px; display:flex; gap:12px; align-items:center; }
    button { font-family:inherit; font-size:14px; border:none; border-radius:8px; padding:9px 16px; cursor:pointer; }
    .primary { background:var(--accent); color:#fff; }
    .primary:disabled { opacity:.5; cursor:default; }
    .ghost { background:#fff; border:1px solid var(--line); color:var(--ink); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { font-size:12px; color:#6b6b8a; }
    .muted { color:#8a8aa6; font-size:13px; }
    .gen-result a { color:var(--accent); }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color:#c0392b; }
  </style>
</head>
<body>
  <h1>SlideGen 企業検索</h1>

  <div class="panel">
    <div class="grid">
      <div>
        <label class="fld">採用人数（範囲）</label>
        <div class="range">
          <input type="number" id="hireMin" placeholder="min">
          <span>〜</span>
          <input type="number" id="hireMax" placeholder="max">
        </div>
      </div>
      <div>
        <label class="fld">企業名（部分一致）</label>
        <input type="text" id="nameContains" placeholder="例: テック">
      </div>
      <div>
        <label class="fld">売れたニーズ（複数選択）</label>
        <div class="tags" id="facet-soldNeeds"><span class="muted">読み込み中…</span></div>
      </div>
      <div>
        <label class="fld">業種（複数選択）</label>
        <div class="tags" id="facet-industry"><span class="muted">読み込み中…</span></div>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="searchBtn" onclick="doSearch()">検索</button>
      <button class="ghost" onclick="resetForm()">条件クリア</button>
      <span id="searchStatus" class="muted"></span>
    </div>
  </div>

  <div class="panel">
    <div id="resultMeta" class="muted">条件を指定して検索してください。</div>
    <div id="resultWrap"></div>
  </div>

<script>
  // 全行のキャッシュ（生成時に行データを参照するため index で保持）
  var lastRows = [];
  var selected = { soldNeeds: {}, industry: {} };

  function onLoad() {
    google.script.run
      .withSuccessHandler(renderFacets)
      .withFailureHandler(function (e) { setText('searchStatus', 'ファセット取得失敗: ' + e.message, true); })
      .getFacets();
  }

  function renderFacets(facets) {
    ['soldNeeds', 'industry'].forEach(function (key) {
      var box = document.getElementById('facet-' + key);
      box.innerHTML = '';
      var vals = (facets && facets[key]) || [];
      if (vals.length === 0) { box.innerHTML = '<span class="muted">（候補なし）</span>'; return; }
      vals.forEach(function (v) {
        var el = document.createElement('span');
        el.className = 'tag';
        el.textContent = v;
        el.onclick = function () {
          if (selected[key][v]) { delete selected[key][v]; el.classList.remove('on'); }
          else { selected[key][v] = true; el.classList.add('on'); }
        };
        box.appendChild(el);
      });
    });
  }

  function buildFilters() {
    var filters = {};
    var min = document.getElementById('hireMin').value;
    var max = document.getElementById('hireMax').value;
    if (min !== '' || max !== '') {
      filters.hireCount = { type: 'range' };
      if (min !== '') filters.hireCount.min = Number(min);
      if (max !== '') filters.hireCount.max = Number(max);
    }
    var needs = Object.keys(selected.soldNeeds);
    if (needs.length) filters.soldNeeds = { type: 'in', values: needs };
    var inds = Object.keys(selected.industry);
    if (inds.length) filters.industry = { type: 'in', values: inds };
    var nameV = document.getElementById('nameContains').value.trim();
    if (nameV) filters.name = { type: 'contains', value: nameV };
    return filters;
  }

  function doSearch() {
    var btn = document.getElementById('searchBtn');
    btn.disabled = true;
    setText('searchStatus', '検索中…');
    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        setText('searchStatus', '');
        renderResults(res);
      })
      .withFailureHandler(function (e) {
        btn.disabled = false;
        setText('searchStatus', '検索失敗: ' + e.message, true);
      })
      .searchCompanies(buildFilters());
  }

  function renderResults(res) {
    lastRows = (res && res.rows) || [];
    document.getElementById('resultMeta').textContent = (res ? res.count : 0) + ' 件ヒット';
    var wrap = document.getElementById('resultWrap');
    if (!lastRows.length) { wrap.innerHTML = '<p class="muted">該当なし</p>'; return; }

    var html = '<table><thead><tr>' +
      '<th>企業名</th><th>採用人数</th><th>売れたニーズ</th><th>業種</th><th>操作</th>' +
      '</tr></thead><tbody>';
    lastRows.forEach(function (r, i) {
      html += '<tr>' +
        '<td>' + esc(r.name) + '</td>' +
        '<td>' + (r.hireCount == null ? '' : r.hireCount) + '</td>' +
        '<td>' + esc(arr(r.soldNeeds)) + '</td>' +
        '<td>' + esc(arr(r.industry)) + '</td>' +
        '<td><button class="primary" onclick="doGenerate(' + i + ', this)">スライド生成</button>' +
        '<div class="gen-result" id="gen-' + i + '"></div></td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function doGenerate(index, btn) {
    var row = lastRows[index];
    if (!row) return;
    btn.disabled = true;
    var cell = document.getElementById('gen-' + index);
    cell.innerHTML = '<span class="spinner"></span> 生成中…';
    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        if (res && res.ok && res.presentationUrl) {
          cell.innerHTML = '<a href="' + res.presentationUrl + '" target="_blank" rel="noopener">スライドを開く ↗</a>';
        } else {
          cell.innerHTML = '<span class="err">失敗: ' + esc((res && res.error) || '不明なエラー') + '</span>';
        }
      })
      .withFailureHandler(function (e) {
        btn.disabled = false;
        cell.innerHTML = '<span class="err">失敗: ' + esc(e.message) + '</span>';
      })
      .generateSlide({ row: row });
  }

  function resetForm() {
    document.getElementById('hireMin').value = '';
    document.getElementById('hireMax').value = '';
    document.getElementById('nameContains').value = '';
    selected = { soldNeeds: {}, industry: {} };
    document.querySelectorAll('.tag.on').forEach(function (el) { el.classList.remove('on'); });
  }

  function setText(id, text, isErr) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.className = 'muted' + (isErr ? ' err' : '');
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[<>&"]/g, function (c) { return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]; }); }
  function arr(a) { return Array.isArray(a) ? a.join('、') : (a || ''); }

  onLoad();
</script>
</body>
</html>
